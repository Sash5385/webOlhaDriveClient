name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy hosting to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

  # Джоб deploy-functions прибрано: Cloud Build API у проєкті не увімкнено, тож functions
  # ніколи не деплоїлись, а падіння джоба робило весь ран червоним (виглядало як «деплой не
  # прийшов», хоча хостинг деплоївся). Якщо знадобляться cloud functions — спершу увімкнути
  # Cloud Build API у GCP-консолі проєкту, потім повернути цей джоб.
